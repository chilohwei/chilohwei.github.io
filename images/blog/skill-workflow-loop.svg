<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Workflow Loop</title>
  <desc id="desc">A workflow diagram showing context, model judgement, deterministic scripts, state, preview, approval, and delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff8ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#203040" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#58708a"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <text x="70" y="84" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#142033">Skill Workflow：把一次输出变成一段可交付流程</text>
  <text x="70" y="124" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#637083">模型负责判断和表达，脚本负责确定性，状态负责恢复，预览和审批负责交付边界。</text>

  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="80" y="220" width="150" height="88" rx="18" fill="#ffffff"/>
    <text x="155" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">触发入口</text>
    <text x="155" y="284" text-anchor="middle" font-size="15" fill="#66758a">用户目标</text>

    <rect x="285" y="220" width="150" height="88" rx="18" fill="#ffffff"/>
    <text x="360" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">上下文</text>
    <text x="360" y="284" text-anchor="middle" font-size="15" fill="#66758a">按需加载</text>

    <rect x="490" y="220" width="150" height="88" rx="18" fill="#ffffff"/>
    <text x="565" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">模型判断</text>
    <text x="565" y="284" text-anchor="middle" font-size="15" fill="#66758a">取舍与表达</text>

    <rect x="695" y="220" width="150" height="88" rx="18" fill="#ffffff"/>
    <text x="770" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">脚本校验</text>
    <text x="770" y="284" text-anchor="middle" font-size="15" fill="#66758a">确定性动作</text>

    <rect x="900" y="220" width="150" height="88" rx="18" fill="#ffffff"/>
    <text x="975" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">状态文件</text>
    <text x="975" y="284" text-anchor="middle" font-size="15" fill="#66758a">可恢复</text>

    <rect x="265" y="410" width="170" height="88" rx="18" fill="#ffffff"/>
    <text x="350" y="446" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">证据账本</text>
    <text x="350" y="474" text-anchor="middle" font-size="15" fill="#66758a">来源与置信度</text>

    <rect x="515" y="410" width="170" height="88" rx="18" fill="#ffffff"/>
    <text x="600" y="446" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">预览门禁</text>
    <text x="600" y="474" text-anchor="middle" font-size="15" fill="#66758a">用户能看见</text>

    <rect x="765" y="410" width="170" height="88" rx="18" fill="#ffffff"/>
    <text x="850" y="446" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2a3a">审批交付</text>
    <text x="850" y="474" text-anchor="middle" font-size="15" fill="#66758a">外部副作用</text>
  </g>

  <g stroke="#58708a" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M230 264 H280"/>
    <path d="M435 264 H485"/>
    <path d="M640 264 H690"/>
    <path d="M845 264 H895"/>
    <path d="M975 309 C975 370 920 392 858 410"/>
    <path d="M765 454 H690"/>
    <path d="M515 454 H440"/>
    <path d="M350 410 C310 368 310 324 360 309"/>
  </g>

  <rect x="74" y="544" width="1052" height="1" fill="#d8e0e8"/>
  <text x="80" y="580" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" fill="#637083">关键点：不要把所有复杂度塞进 prompt。能落脚本的落脚本，能落状态的落状态，该停下来审批的就停下来。</text>
</svg>
