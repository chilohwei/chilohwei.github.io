<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Boundaries</title>
  <desc id="desc">A diagram showing boundaries between context, memory, permission, and acceptance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f2"/>
      <stop offset="1" stop-color="#f2f8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#203040" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <text x="70" y="84" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#142033">协作系统最怕的不是 Agent 少，而是边界不清</text>
  <text x="70" y="124" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#637083">边界清楚之后，Agent 才能放心自治；边界不清，越自动越危险。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" filter="url(#shadow)">
    <rect x="90" y="205" width="230" height="280" rx="22" fill="#ffffff"/>
    <circle cx="205" cy="265" r="36" fill="#dbeafe"/>
    <text x="205" y="274" text-anchor="middle" font-size="28" font-weight="800" fill="#1f6feb">1</text>
    <text x="205" y="335" text-anchor="middle" font-size="24" font-weight="700" fill="#1c2a3a">上下文边界</text>
    <text x="205" y="374" text-anchor="middle" font-size="16" fill="#66758a">哪些常驻</text>
    <text x="205" y="402" text-anchor="middle" font-size="16" fill="#66758a">哪些按需加载</text>
    <text x="205" y="430" text-anchor="middle" font-size="16" fill="#66758a">哪些不进上下文</text>

    <rect x="355" y="205" width="230" height="280" rx="22" fill="#ffffff"/>
    <circle cx="470" cy="265" r="36" fill="#dcfce7"/>
    <text x="470" y="274" text-anchor="middle" font-size="28" font-weight="800" fill="#2da44e">2</text>
    <text x="470" y="335" text-anchor="middle" font-size="24" font-weight="700" fill="#1c2a3a">记忆边界</text>
    <text x="470" y="374" text-anchor="middle" font-size="16" fill="#66758a">项目事实归项目</text>
    <text x="470" y="402" text-anchor="middle" font-size="16" fill="#66758a">角色经验归角色</text>
    <text x="470" y="430" text-anchor="middle" font-size="16" fill="#66758a">共享知识要审核</text>

    <rect x="620" y="205" width="230" height="280" rx="22" fill="#ffffff"/>
    <circle cx="735" cy="265" r="36" fill="#fff2cc"/>
    <text x="735" y="274" text-anchor="middle" font-size="28" font-weight="800" fill="#bf8700">3</text>
    <text x="735" y="335" text-anchor="middle" font-size="24" font-weight="700" fill="#1c2a3a">权限边界</text>
    <text x="735" y="374" text-anchor="middle" font-size="16" fill="#66758a">读写分开</text>
    <text x="735" y="402" text-anchor="middle" font-size="16" fill="#66758a">副作用需确认</text>
    <text x="735" y="430" text-anchor="middle" font-size="16" fill="#66758a">工具调用可审计</text>

    <rect x="885" y="205" width="230" height="280" rx="22" fill="#ffffff"/>
    <circle cx="1000" cy="265" r="36" fill="#ffebe9"/>
    <text x="1000" y="274" text-anchor="middle" font-size="28" font-weight="800" fill="#cf222e">4</text>
    <text x="1000" y="335" text-anchor="middle" font-size="24" font-weight="700" fill="#1c2a3a">验收边界</text>
    <text x="1000" y="374" text-anchor="middle" font-size="16" fill="#66758a">完成不是感觉</text>
    <text x="1000" y="402" text-anchor="middle" font-size="16" fill="#66758a">风险必须披露</text>
    <text x="1000" y="430" text-anchor="middle" font-size="16" fill="#66758a">下游能接才算完</text>
  </g>
</svg>
