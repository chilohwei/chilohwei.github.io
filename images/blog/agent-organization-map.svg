<svg width="1200" height="650" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Organization Map</title>
  <desc id="desc">A multi-agent organization diagram with channel, main agent, workers, subagents, memory, tools and delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#fff7f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#203040" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#58708a"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="32" fill="url(#bg)"/>
  <text x="70" y="84" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#142033">多 Agent 不是并排跑模型，而是搭协作组织</text>
  <text x="70" y="124" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#637083">Channel 承载任务现场，Main 负责治理，Worker 负责专业交付，Subagent 只处理临时小任务。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" filter="url(#shadow)">
    <rect x="70" y="280" width="140" height="90" rx="18" fill="#ffffff"/>
    <text x="140" y="318" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">User</text>
    <text x="140" y="348" text-anchor="middle" font-size="15" fill="#66758a">目标 / 决策</text>

    <rect x="285" y="245" width="220" height="160" rx="24" fill="#1f6feb"/>
    <text x="395" y="295" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">Channel</text>
    <text x="395" y="330" text-anchor="middle" font-size="16" fill="#eaf3ff">任务、上下文、事件</text>
    <text x="395" y="358" text-anchor="middle" font-size="16" fill="#eaf3ff">产物和最终交付</text>

    <rect x="590" y="170" width="180" height="95" rx="20" fill="#ffffff"/>
    <text x="680" y="208" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Main Agent</text>
    <text x="680" y="237" text-anchor="middle" font-size="15" fill="#66758a">路由 / 仲裁 / 风险</text>

    <rect x="575" y="315" width="210" height="95" rx="20" fill="#ffffff"/>
    <text x="680" y="353" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Worker Agents</text>
    <text x="680" y="382" text-anchor="middle" font-size="15" fill="#66758a">产品 / 设计 / 工程 / 测试</text>

    <rect x="590" y="465" width="180" height="95" rx="20" fill="#ffffff"/>
    <text x="680" y="503" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Subagents</text>
    <text x="680" y="532" text-anchor="middle" font-size="15" fill="#66758a">临时 / 有界 / 可退出</text>

    <rect x="875" y="190" width="210" height="90" rx="18" fill="#ffffff"/>
    <text x="980" y="228" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Memory</text>
    <text x="980" y="257" text-anchor="middle" font-size="15" fill="#66758a">共享知识 / 私有经验</text>

    <rect x="875" y="345" width="210" height="90" rx="18" fill="#ffffff"/>
    <text x="980" y="383" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Tools / MCP</text>
    <text x="980" y="412" text-anchor="middle" font-size="15" fill="#66758a">动作能力 / 权限边界</text>

    <rect x="875" y="500" width="210" height="90" rx="18" fill="#ffffff"/>
    <text x="980" y="538" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2a3a">Delivery</text>
    <text x="980" y="567" text-anchor="middle" font-size="15" fill="#66758a">验收 / 风险 / 交付</text>
  </g>

  <g stroke="#58708a" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M210 325 H280"/>
    <path d="M505 295 C545 250 560 220 585 218"/>
    <path d="M505 345 H570"/>
    <path d="M505 370 C545 430 560 500 585 512"/>
    <path d="M770 218 H870"/>
    <path d="M785 362 H870"/>
    <path d="M770 512 H870"/>
    <path d="M875 545 C690 615 430 590 395 410"/>
  </g>
</svg>
