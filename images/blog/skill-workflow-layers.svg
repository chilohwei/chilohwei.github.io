<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Workflow Layers</title>
  <desc id="desc">A layered diagram for Skill Workflow design.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf3"/>
      <stop offset="1" stop-color="#f3f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#203040" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <text x="70" y="84" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#142033">一个 Workflow，至少要分清五层</text>
  <text x="70" y="124" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#637083">写清楚每一层负责什么，比把规则堆进一个长 prompt 更重要。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" filter="url(#shadow)">
    <rect x="130" y="185" width="940" height="70" rx="18" fill="#1f6feb"/>
    <text x="180" y="229" font-size="24" font-weight="700" fill="#fff">入口层</text>
    <text x="330" y="229" font-size="18" fill="#eaf3ff">什么时候触发、需要什么输入、第一步该做什么</text>

    <rect x="170" y="270" width="860" height="70" rx="18" fill="#2da44e"/>
    <text x="220" y="314" font-size="24" font-weight="700" fill="#fff">知识层</text>
    <text x="370" y="314" font-size="18" fill="#edf8f0">方法、模板、领域规则，按需加载，不常驻污染上下文</text>

    <rect x="210" y="355" width="780" height="70" rx="18" fill="#bf8700"/>
    <text x="260" y="399" font-size="24" font-weight="700" fill="#fff">执行层</text>
    <text x="410" y="399" font-size="18" fill="#fff7df">脚本、命令、校验、格式转换、预览生成</text>

    <rect x="250" y="440" width="700" height="70" rx="18" fill="#8250df"/>
    <text x="300" y="484" font-size="24" font-weight="700" fill="#fff">状态层</text>
    <text x="450" y="484" font-size="18" fill="#f4edff">进度、证据、决策、变更，可恢复也可审计</text>

    <rect x="290" y="525" width="620" height="70" rx="18" fill="#cf222e"/>
    <text x="340" y="569" font-size="24" font-weight="700" fill="#fff">交付层</text>
    <text x="490" y="569" font-size="18" fill="#fff0f2">预览、审批、发布、回滚，不把副作用藏进聊天</text>
  </g>
</svg>
